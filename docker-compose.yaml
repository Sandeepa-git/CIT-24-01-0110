services:

  mongodb:
    image: mongo
    container_name: mongodb
    restart: always

    volumes:
      - mongodb_data:/data/db

    networks:
      - notes_network

  backend:
    build: ./backend
    container_name: backend

    restart: always

    ports:
      - "5000:5000"

    depends_on:
      - mongodb

    networks:
      - notes_network

  frontend:
    image: nginx
    container_name: frontend

    restart: always

    ports:
      - "8180:80"

    volumes:
      - ./frontend:/usr/share/nginx/html

    networks:
      - notes_network

volumes:
  mongodb_data:

networks:
  notes_network: